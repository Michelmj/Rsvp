{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>We'll Miss You — Sephora & Mario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'invitations/css/style2.css' %}">

  <style>
    .decline-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(40px, 8vw, 100px) clamp(20px, 5vw, 40px);
      background: #f3eee6;
    }

    .decline-card {
      background: white;
      border-radius: 20px;
      padding: clamp(30px, 6vw, 60px) clamp(24px, 5vw, 60px);
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      text-align: center;
    }

    .decline-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(36px, 8vw, 56px);
      color: #24314f;
      margin-bottom: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 30px;
      width: 70%;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    }

    .divider-icon {
      color: #c9a84c;
      font-size: 14px;
    }

    .decline-message {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 3.5vw, 20px);
      color: #24314f;
      line-height: 1.7;
      letter-spacing: 0.5px;
      margin-bottom: 30px;
    }

    .decline-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 2.5vw, 15px);
      color: #24314f;
      opacity: 0.6;
      font-style: italic;
      letter-spacing: 1px;
    }

    .back-link {
      display: inline-block;
      margin-top: 32px;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(12px, 2.5vw, 14px);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #24314f;
      text-decoration: none;
      border-bottom: 1px solid #c9a84c;
      padding-bottom: 2px;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .back-link:hover { opacity: 1; }

    #petal-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      background-color: #ffc0cb;
      border-radius: 150% 0 150% 0;
      opacity: 0.8;
      filter: blur(1px);
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      100% { transform: translateY(110vh) translateX(100px) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="decline-page">
    <div class="decline-card">

      <div class="decline-title">It is Unfortunate!</div>

      <div class="divider"><span class="divider-icon">✦</span></div>

      <p class="decline-message">
        Thank you for letting us know you are unfortunately unable to make it!
      </p>

      <p class="decline-sub">
        <br>
        Sephora & Mario
      </p>

    </div>
  </div>

  <script>
    function createPetals() {
      const container = document.createElement('div');
      container.id = 'petal-container';
      document.body.appendChild(container);
      for (let i = 0; i < 20; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const size = Math.random() * 15 + 10 + 'px';
        petal.style.width = size;
        petal.style.height = size;
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.animationDuration = Math.random() * 5 + 5 + 's';
        petal.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(petal);
      }
    }
    window.addEventListener('load', createPetals);
  </script>

</body>
</html>
